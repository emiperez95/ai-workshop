<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop Promo</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0a0a0a;
    font-family: 'Inter', sans-serif;
  }

  .card {
    width: 720px;
    height: 360px;
    background: #0d1117;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 50px 60px;
  }

  /* Subtle grid background */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Glow accent */
  .glow {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(217, 119, 6, 0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .glow-2 {
    position: absolute;
    bottom: -150px;
    left: -100px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
  }

  /* Terminal prompt line */
  .prompt {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: #6b7280;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .prompt .path {
    color: #818cf8;
  }

  .prompt .dollar {
    color: #d97706;
  }

  .prompt .cmd {
    color: #e5e7eb;
  }

  .prompt .cursor {
    display: inline-block;
    width: 10px;
    height: 22px;
    background: #e5e7eb;
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .title {
    font-family: 'Inter', sans-serif;
    font-size: 52px;
    font-weight: 800;
    color: #f9fafb;
    line-height: 1.1;
    letter-spacing: -2px;
    margin-bottom: 24px;
  }

  .title .highlight {
    background: linear-gradient(135deg, #d97706, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 20px;
    font-weight: 300;
    color: #9ca3af;
    letter-spacing: -0.5px;
    line-height: 1.5;
  }

  .tagline em {
    font-style: normal;
    color: #d1d5db;
    font-weight: 400;
  }

  /* Bottom bar */
  .bottom {
    position: absolute;
    bottom: 30px;
    left: 60px;
    right: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1;
  }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #6b7280;
    background: rgba(99, 102, 241, 0.08);
    border: 1px solid rgba(99, 102, 241, 0.15);
    padding: 8px 16px;
    border-radius: 8px;
  }

  .duration {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #6b7280;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="glow-2"></div>

    <div class="content">
      <div class="prompt">
        <span class="path">~/proyecto</span>
        <span class="dollar">$</span>
        <span class="cmd">claude</span>
        <span class="cursor"></span>
      </div>

      <h1 class="title">
        Claude AI<br>
        <span class="highlight">Workshop</span>
      </h1>

      <p class="tagline">
        De <em>ticket</em> a <em>pull request</em> con AI agentic
      </p>
    </div>

    <div class="bottom">
      <span class="badge">Claude Code</span>
      <span class="duration">Jueves 26 Feb · 15:00 – 16:30</span>
    </div>
  </div>
</body>
</html>
